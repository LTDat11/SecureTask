services:
  api:
    build:
      context: .
      dockerfile: SecureTaskApi/Dockerfile
    container_name: securetask-api
    ports:
      - "5050:8080"
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - securetask-network

  web:
    build:
      context: .
      dockerfile: SecureTaskWeb/Dockerfile
    container_name: securetask-web
    ports:
      - "5051:8080"
    env_file:
      - .env
    depends_on:
      - api
    networks:
      - securetask-network

  db:
    image: postgres:16
    container_name: securetask-postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - securetask-network

volumes:
  postgres_data:

networks:
  securetask-network:
    driver: bridge
