name: CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore SecureTaskApi/SecureTaskApi.sln

      - name: Build
        run: dotnet build SecureTaskApi/SecureTaskApi.sln --no-restore --configuration Release

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ci_test_password
          POSTGRES_DB: securetaskdb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      JWT_KEY: ${{ secrets.JWT_KEY }}
      JWT_ISSUER: ${{ secrets.JWT_ISSUER }}
      JWT_AUDIENCE: ${{ secrets.JWT_AUDIENCE }}
      ConnectionStrings__Default: "Host=localhost;Port=5432;Database=securetaskdb_test;Username=postgres;Password=ci_test_password"

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore SecureTaskApi/SecureTaskApi.sln

      - name: Build
        run: dotnet build SecureTaskApi/SecureTaskApi.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test SecureTaskApi/SecureTaskApi.sln --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage"
